<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoDial 设置</title>
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #F0C040;
    --gold-dark: #8B6914;
    --bg: #111318;
    --bg2: #1A1D24;
    --bg3: #22262F;
    --text: #E8DCC8;
    --text2: #A09070;
    --green: #2ECC71;
    --red: #E74C3C;
    --radius-sm: 5px;
    --radius-md: 10px;
    --radius-lg: 24px;
    --shadow: none;
    --font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    --gradient-green: linear-gradient(135deg, #27AE60, #1E8449);
    --gradient-red: linear-gradient(135deg, #C0392B, #96281B);
    --glow-text: none;
    --floatbar-bg: rgba(26, 29, 36, 0.72);
    --floatbar-border: rgba(201, 168, 76, 0.25);
    --floatbar-blur: blur(20px);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-family);
    overflow: hidden;
    user-select: none;
  }
  .wrap {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
  }

  /* 标题栏 */
  .titlebar {
    background: var(--bg2);
    border-bottom: 1px solid var(--gold-dark);
    display: flex;
    align-items: center;
    flex-shrink: 0;
    -webkit-app-region: drag;
    height: 36px;
    padding: 0 14px;
  }
  .titlebar .logo {
    font-size: 13px;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .titlebar-btns {
    display: flex;
    margin-left: auto;
    height: 100%;
    -webkit-app-region: no-drag;
  }
  .titlebar-btn {
    width: 46px; height: 36px;
    background: none; border: none;
    color: var(--text2);
    font-size: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
  }
  .titlebar-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }

  /* 内容 */
  .content {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
  }
  .content::-webkit-scrollbar { width: 3px; }
  .content::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

  .section-title {
    font-size: 11px;
    color: var(--text2);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--bg3);
  }

  .setting-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    background: var(--bg2);
    border-radius: var(--radius-md);
    margin-bottom: 8px;
    border: 1px solid var(--bg3);
    transition: border-color 0.2s;
  }
  .setting-item:hover { border-color: var(--gold-dark); }

  /* 纵向布局的设置项（主题选择器） */
  .setting-item.column {
    flex-direction: column;
    align-items: flex-start;
  }

  .setting-info {
    flex: 1;
  }
  .setting-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }
  .setting-desc {
    font-size: 11px;
    color: var(--text2);
    line-height: 1.4;
  }

  /* 开关 */
  .switch {
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    flex-shrink: 0;
    margin-left: 16px;
  }
  .switch input { display: none; }
  .switch .sw-track {
    width: 36px; height: 18px;
    background: var(--bg);
    border-radius: 9px;
    position: relative;
    transition: background 0.2s;
    border: 1px solid var(--text2);
  }
  .switch .sw-track::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--text2);
    transition: all 0.2s;
  }
  .switch input:checked + .sw-track {
    background: var(--gold-dark);
    border-color: var(--gold);
  }
  .switch input:checked + .sw-track::after {
    left: 20px;
    background: var(--gold-light);
  }

  /* 选择框 */
  .select-group {
    display: flex;
    gap: 5px;
    flex-shrink: 0;
    margin-left: 16px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .select-option {
    padding: 4px 10px;
    background: var(--bg);
    border: 1px solid var(--bg3);
    border-radius: var(--radius-sm);
    font-size: 11px;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .select-option:hover { border-color: var(--gold-dark); color: var(--text); }
  .select-option.active {
    background: var(--gold-dark);
    border-color: var(--gold);
    color: var(--gold-light);
    font-weight: 600;
  }

  .spacer { height: 14px; }

  /* ==================== 主题选择器 ==================== */
  .theme-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 10px;
    width: 100%;
  }
  .theme-card {
    cursor: pointer;
    text-align: center;
    transition: transform 0.15s;
    padding: 4px;
  }
  .theme-card:hover { transform: scale(1.05); }
  .theme-card.active { transform: scale(1.05); }
  .theme-preview {
    width: 100%;
    height: 32px;
    border-radius: var(--radius-sm);
    border: 2px solid transparent;
    overflow: hidden;
    display: flex;
    margin-bottom: 4px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .theme-preview > span {
    flex: 1;
    height: 100%;
  }
  .theme-card.active .theme-preview {
    border-color: var(--gold);
    box-shadow: 0 0 8px rgba(201,168,76,0.4);
  }
  .theme-name {
    font-size: 9px;
    color: var(--text2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
  }

  /* 模式选择行 */
  .mode-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--bg3);
    flex-wrap: wrap;
    gap: 8px;
  }
  .mode-row .setting-label {
    font-size: 12px;
    margin-bottom: 0;
  }
  /* 显示模式两行grid */
  .mode-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
    width: 100%;
    margin-top: 6px;
  }
  .mode-grid .select-option {
    text-align: center;
    margin-left: 0;
  }

  .footer {
    text-align: center;
    padding: 10px;
    font-size: 10px;
    color: var(--text2);
    flex-shrink: 0;
  }
</style>
<script src="../themes/theme-data.js"></script>
<script src="js/theme.js"></script>
</head>
<body>
<div class="wrap">
  <div class="titlebar">
    <div class="logo">&#x2699; 设置</div>
    <div class="titlebar-btns">
      <button class="titlebar-btn" id="btnClose">
        <svg width="10" height="10" viewBox="0 0 10 10">
          <line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1.2"/>
          <line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1.2"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="content">
    <!-- 窗口行为 -->
    <div class="section-title">窗口行为</div>

    <div class="setting-item">
      <div class="setting-info">
        <div class="setting-label">关闭按钮行为</div>
        <div class="setting-desc">点击标题栏 X 时执行的操作</div>
      </div>
      <div class="select-group" id="closeAction">
        <div class="select-option active" data-value="minimize">最小化</div>
        <div class="select-option" data-value="exit">退出</div>
      </div>
    </div>

    <div class="setting-item">
      <div class="setting-info">
        <div class="setting-label">托盘图标退出</div>
        <div class="setting-desc">右键托盘退出时直接退出程序</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="trayExit" checked>
        <span class="sw-track"></span>
      </label>
    </div>

    <div class="spacer"></div>

    <!-- 启动 -->
    <div class="section-title">启动</div>

    <div class="setting-item">
      <div class="setting-info">
        <div class="setting-label">开机自启动</div>
        <div class="setting-desc">Windows 启动时自动运行 AutoDial</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="autoStart">
        <span class="sw-track"></span>
      </label>
    </div>

    <div class="setting-item">
      <div class="setting-info">
        <div class="setting-label">隐藏界面启动</div>
        <div class="setting-desc">开机自启动时不显示主窗口，仅托盘运行</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="silentStart">
        <span class="sw-track"></span>
      </label>
    </div>

    <div class="spacer"></div>

    <!-- 外观 -->
    <div class="section-title">外观</div>

    <div class="setting-item column">
      <div class="setting-info" style="width:100%">
        <div class="setting-label">主题</div>
        <div class="setting-desc">选择界面风格和配色方案</div>
      </div>
      <div class="theme-grid" id="themeGrid"></div>
      <div class="mode-row">
        <div class="setting-label">显示模式</div>
        <div class="mode-grid" id="modeSelect">
          <div class="select-option active" data-value="dark">&#x1F311; 暗夜</div>
          <div class="select-option" data-value="dusk">&#x1F306; 黄昏</div>
          <div class="select-option" data-value="dawn">&#x1F305; 朝阳</div>
          <div class="select-option" data-value="twilight">&#x1F307; 暮光</div>
          <div class="select-option" data-value="warm">&#x1F324; 暖光</div>
          <div class="select-option" data-value="mist">&#x1F325; 晨雾</div>
          <div class="select-option" data-value="light">&#x2600; 亮白</div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">AutoDial v3.1</div>
</div>

<script>
/* 初始化主题 */
if (typeof ThemeEngine !== 'undefined') ThemeEngine.initTheme();

document.getElementById('btnClose').addEventListener('click', () => {
  window.api.send('close-settings');
});

// ==================== 主题选择器 ====================
let currentTheme = 'dark-gold';
let currentMode = 'dark';

function renderThemeCards() {
  const grid = document.getElementById('themeGrid');
  grid.innerHTML = '';
  THEME_DATA.forEach(t => {
    const card = document.createElement('div');
    card.className = 'theme-card';
    card.dataset.id = t.id;
    // 使用暗色预览
    const preview = t.dark;
    card.innerHTML =
      '<div class="theme-preview">' +
        '<span style="background:' + preview.gold + '"></span>' +
        '<span style="background:' + preview.bg + '"></span>' +
        '<span style="background:' + preview.bg2 + '"></span>' +
        '<span style="background:' + preview.text + '"></span>' +
      '</div>' +
      '<div class="theme-name">' + t.name + '</div>';
    card.addEventListener('click', () => selectTheme(t.id));
    grid.appendChild(card);
  });
}

function selectTheme(id) {
  currentTheme = id;
  document.querySelectorAll('.theme-card').forEach(c =>
    c.classList.toggle('active', c.dataset.id === id)
  );
  window.api.send('change-theme', { id: id });
  if (typeof ThemeEngine !== 'undefined') {
    ThemeEngine.applyTheme(id, currentMode);
  }
}

// 模式切换
document.querySelectorAll('#modeSelect .select-option').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('#modeSelect .select-option').forEach(o => o.classList.remove('active'));
    opt.classList.add('active');
    currentMode = opt.dataset.value;
    window.api.send('change-theme', { id: currentTheme, mode: currentMode });
    if (typeof ThemeEngine !== 'undefined') {
      ThemeEngine.applyTheme(currentTheme, currentMode);
    }
  });
});

// ==================== 加载设置 ====================
async function loadSettings() {
  try {
    const s = await window.api.invoke('get-settings');

    // 关闭按钮行为
    document.querySelectorAll('#closeAction .select-option').forEach(opt => {
      opt.classList.toggle('active', opt.dataset.value === (s.closeAction || 'minimize'));
    });
    // 托盘退出
    document.getElementById('trayExit').checked = s.trayExit !== false;
    // 开机自启动
    document.getElementById('autoStart').checked = s.autoStart || false;
    // 隐藏界面启动
    document.getElementById('silentStart').checked = s.silentStart || false;
    // 主题设置
    currentTheme = s.theme || 'dark-gold';
    currentMode = s.mode || 'dark';
    // 兼容旧版模式名称
    const modeCompat = { 'auto': 'dawn' };
    if (modeCompat[currentMode]) {
      currentMode = modeCompat[currentMode];
      saveSetting('mode', currentMode);
    }
    document.querySelectorAll('.theme-card').forEach(c =>
      c.classList.toggle('active', c.dataset.id === currentTheme)
    );
    document.querySelectorAll('#modeSelect .select-option').forEach(o =>
      o.classList.toggle('active', o.dataset.value === currentMode)
    );
  } catch (e) {}
}

// ==================== 保存设置 ====================
function saveSetting(key, value) {
  window.api.send('save-setting', { key, value });
}

// ==================== 关闭行为选择 ====================
document.querySelectorAll('#closeAction .select-option').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('#closeAction .select-option').forEach(o => o.classList.remove('active'));
    opt.classList.add('active');
    saveSetting('closeAction', opt.dataset.value);
  });
});

// ==================== 开关 ====================
document.getElementById('trayExit').addEventListener('change', function() {
  saveSetting('trayExit', this.checked);
});

document.getElementById('autoStart').addEventListener('change', function() {
  saveSetting('autoStart', this.checked);
  window.api.send('set-auto-start', this.checked);
});

document.getElementById('silentStart').addEventListener('change', function() {
  saveSetting('silentStart', this.checked);
});

// 监听来自其他窗口的主题变更
if (typeof window !== 'undefined' && window.api) {
  window.api.on('theme-changed', (data) => {
    currentTheme = data.theme || data.id;
    currentMode = data.mode;
    document.querySelectorAll('.theme-card').forEach(c =>
      c.classList.toggle('active', c.dataset.id === currentTheme)
    );
    document.querySelectorAll('#modeSelect .select-option').forEach(o =>
      o.classList.toggle('active', o.dataset.value === currentMode)
    );
  });
}

renderThemeCards();
loadSettings();
</script>
</body>
</html>
