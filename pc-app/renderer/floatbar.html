<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoDial</title>
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #F0C040;
    --gold-dark: #8B6914;
    --bg: #111318;
    --bg2: #1A1D24;
    --bg3: #22262F;
    --text: #E8DCC8;
    --text2: #A09070;
    --green: #2ECC71;
    --red: #E74C3C;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: transparent;
    color: var(--text);
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
    user-select: none;
  }
  .float-bar {
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg2);
    border: 1px solid var(--gold-dark);
    border-radius: 24px;
    padding: 0 6px 0 8px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    cursor: move;
    user-select: none;
    transition: box-shadow 0.2s;
    position: relative;
  }
  .float-bar:hover { border-color: var(--gold); box-shadow: 0 4px 30px rgba(201,168,76,0.15); }
  .float-bar.dragging { box-shadow: 0 8px 32px rgba(0,0,0,0.7); opacity: 0.9; }
  .fb-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 6px var(--red);
    flex-shrink: 0;
  }
  .fb-dot.on {
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
  .fb-sep {
    width: 1px; height: 20px;
    background: var(--bg3);
    flex-shrink: 0;
    margin: 0 2px;
  }
  .fb-scan-btn {
    background: var(--bg);
    border: 1px solid var(--gold-dark);
    border-radius: 12px;
    padding: 3px 8px;
    color: var(--gold-light);
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .fb-scan-btn:hover { background: var(--bg3); border-color: var(--gold); }
  .fb-scan-btn:active { transform: scale(0.95); }
  .fb-scan-btn.scanning { pointer-events: none; opacity: 0.6; }
  .fb-input {
    background: var(--bg);
    border: 1px solid var(--bg3);
    border-radius: 12px;
    padding: 3px 8px;
    color: var(--text);
    font-size: 12px;
    font-weight: 600;
    width: 110px;
    outline: none;
    letter-spacing: 0.5px;
    transition: border-color 0.15s;
    flex-shrink: 1;
    min-width: 60px;
  }
  .fb-input::placeholder { color: var(--text2); font-size: 10px; font-weight: 400; }
  .fb-input:focus { border-color: var(--gold); }
  .fb-dial-btn {
    background: linear-gradient(135deg, #27AE60, #1E8449);
    border: none; border-radius: 12px;
    padding: 3px 10px;
    color: white; font-size: 11px; font-weight: 700;
    cursor: pointer; white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
    display: flex; align-items: center; gap: 3px;
  }
  .fb-dial-btn:hover:not(:disabled) { background: linear-gradient(135deg, #2ECC71, #27AE60); }
  .fb-dial-btn:disabled { background: var(--bg3); color: var(--text2); cursor: not-allowed; opacity: 0.5; }
  .fb-hangup-btn {
    background: linear-gradient(135deg, #C0392B, #96281B);
    border: none; border-radius: 12px;
    padding: 3px 10px;
    color: white; font-size: 11px; font-weight: 700;
    cursor: pointer; white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
    display: flex; align-items: center; gap: 3px;
  }
  .fb-hangup-btn:hover:not(:disabled) { background: linear-gradient(135deg, #E74C3C, #C0392B); }
  .fb-hangup-btn:disabled { background: var(--bg3); color: var(--text2); cursor: not-allowed; opacity: 0.5; }
  /* 缩放手柄 - 右下角小三角 */
  .fb-resize-handle {
    position: absolute;
    right: 0; bottom: 0;
    width: 16px; height: 16px;
    cursor: nwse-resize;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .fb-resize-handle::before,
  .fb-resize-handle::after {
    content: '';
    position: absolute;
    border-right: 2px solid var(--gold);
    border-bottom: 2px solid var(--gold);
  }
  .fb-resize-handle::before {
    width: 8px; height: 8px;
    bottom: 3px; right: 3px;
    opacity: 0.5;
  }
  .fb-resize-handle::after {
    width: 5px; height: 5px;
    bottom: 3px; right: 3px;
    opacity: 0.8;
  }
  .float-bar:hover .fb-resize-handle { opacity: 1; }
  .toast {
    position: fixed; top: -8px; left: 50%;
    transform: translateX(-50%) translateY(-40px);
    background: var(--bg3); border: 1px solid var(--gold-dark);
    border-radius: 8px; padding: 6px 14px;
    font-size: 11px; color: var(--text);
    transition: transform 0.25s; z-index: 999; white-space: nowrap;
    pointer-events: none;
  }
  /* 缩放内容层 - 实际内容通过 transform scale 缩放 */
  .fb-content {
    transform-origin: left center;
    width: 340px;
    height: 48px;
  }
  /* 右键菜单 */
  .fb-context-menu {
    position: fixed;
    min-width: 140px;
    background: var(--bg2);
    border: 1px solid var(--gold-dark);
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    z-index: 100;
    display: none;
  }
  .fb-context-menu.show {
    display: block;
  }
  .fb-menu-item {
    padding: 8px 12px;
    font-size: 12px;
    color: var(--text);
    cursor: pointer;
    transition: background 0.1s;
    white-space: nowrap;
  }
  .fb-menu-item:first-child { border-radius: 7px 7px 0 0; }
  .fb-menu-item:last-child { border-radius: 0 0 7px 7px; }
  .fb-menu-item:hover { background: var(--bg3); }
  .fb-menu-item.fb-menu-danger { color: var(--red); }
  .fb-menu-item.fb-menu-danger:hover { background: rgba(231,76,60,0.1); }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error   { border-color: var(--red);   color: var(--red);   }
</style>
</head>
<body>
<div class="fb-content" id="fbContent">
  <div class="float-bar" id="floatBar">
    <div class="fb-dot" id="fbDot"></div>
    <div class="fb-sep"></div>
    <button class="fb-scan-btn" id="fbScanBtn">清空</button>
    <input type="text" class="fb-input" id="fbInput" placeholder="复制号码..." readonly>
    <div class="fb-sep"></div>
    <button class="fb-dial-btn" id="fbDialBtn" disabled>&#x1F4DE; 拨打</button>
    <button class="fb-hangup-btn" id="fbHangupBtn" disabled>&#x1F4F5; 挂断</button>
    <div class="fb-resize-handle" id="fbResizeHandle"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* window.api 通过 preload.js contextBridge 注入 */
let isConnected = false;
let currentScale = 1.0;

// 监听主进程推送的缩放值，用 CSS transform 缩放内容
window.api.on('floatbar-scale-changed', (scale) => {
  currentScale = scale;
  const content = document.getElementById('fbContent');
  if (content) {
    content.style.transform = 'scale(' + scale + ')';
  }
});

// ==================== 拖拽缩放（右下角手柄） ====================
(function() {
  const handle = document.getElementById('fbResizeHandle');
  let resizing = false, startX = 0;

  handle.addEventListener('mousedown', onDown);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);

  function onDown(e) {
    resizing = true;
    startX = e.clientX;
    e.preventDefault();
    e.stopPropagation();
  }
  function onMove(e) {
    if (!resizing) return;
    const diff = e.clientX - startX;
    const delta = Math.round(diff / 30);
    if (delta !== 0) {
      window.api.send('floatbar-resize', delta);
      startX = e.clientX;
    }
    e.preventDefault();
  }
  function onUp() {
    resizing = false;
  }
})();

// ==================== 拖拽 ====================
(function() {
  const bar = document.getElementById('floatBar');
  let dragging = false, offsetX = 0, offsetY = 0;

  bar.addEventListener('mousedown', onDown);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);

  function onDown(e) {
    if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
    dragging = true;
    bar.classList.add('dragging');
    const rect = bar.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
    e.preventDefault();
  }
  function onMove(e) {
    if (!dragging) return;
    window.api.send('floatbar-move', { x: e.screenX - offsetX, y: e.screenY - offsetY });
    e.preventDefault();
  }
  function onUp() {
    if (!dragging) return;
    dragging = false;
    bar.classList.remove('dragging');
  }
})();

// ==================== 按钮 ====================
document.getElementById('fbScanBtn').addEventListener('click', clearNumber);
document.getElementById('fbDialBtn').addEventListener('click', dialFromFloat);
document.getElementById('fbHangupBtn').addEventListener('click', hangupFromFloat);

// ==================== 右键菜单 ====================
(function() {
  const bar = document.getElementById('floatBar');

  // 创建右键菜单
  let menu = document.createElement('div');
  menu.className = 'fb-context-menu';
  menu.id = 'fbContextMenu';
  menu.innerHTML = '<div class="fb-menu-item" id="fbMenuShowMain">&#x1F3E0; 显示主窗口</div>' +
                   '<div class="fb-menu-item fb-menu-danger" id="fbMenuHideFloat">&#x2716; 隐藏悬浮条</div>';
  document.body.appendChild(menu);

  bar.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    e.stopPropagation();
    // 用 fixed 定位，直接用屏幕坐标
    const menuW = 140, menuH = 64;
    let left = e.clientX;
    let top = e.clientY - menuH - 4; // 在鼠标上方
    if (top < 0) top = e.clientY + 4; // 上方空间不够就在下方
    menu.style.left = left + 'px';
    menu.style.top = top + 'px';
    menu.classList.add('show');
  });

  document.addEventListener('mousedown', (e) => {
    if (!menu.contains(e.target)) {
      menu.classList.remove('show');
    }
  });

  document.getElementById('fbMenuShowMain').addEventListener('click', (e) => {
    e.stopPropagation();
    menu.classList.remove('show');
    window.api.send('floatbar-show-main');
  });

  document.getElementById('fbMenuHideFloat').addEventListener('click', (e) => {
    e.stopPropagation();
    menu.classList.remove('show');
    window.api.send('toggle-floatbar', false);
  });
})();

// ==================== IPC 事件 ====================
window.api.on('status-update', (data) => {
  isConnected = data.connected;
  const dot = document.getElementById('fbDot');
  const dialBtn = document.getElementById('fbDialBtn');
  const hangupBtn = document.getElementById('fbHangupBtn');
  if (data.connected) {
    dot.className = 'fb-dot on';
    dialBtn.disabled = !document.getElementById('fbInput').value;
    hangupBtn.disabled = false;
  } else {
    dot.className = 'fb-dot';
    dialBtn.disabled = true;
    hangupBtn.disabled = true;
  }
});

window.api.on('dial-sent', (data) => {
  showToast('已发送: ' + data.number, 'success');
});

window.api.on('dial-result', (data) => {
  showToast(data.number + ' ' + (data.status === 'ok' ? '成功' : '失败'), data.status === 'ok' ? 'success' : 'error');
});

window.api.on('hangup-sent', () => {
  showToast('已发送挂断', 'success');
});

window.api.on('error', (data) => {
  showToast(data.message, 'error');
});

// ==================== 剪贴板读取 ====================
let lastClipboard = '';
let clipboardTimer = null;

function extractPhone(text) {
  const m = text.match(/1[3-9]\d[\s\-]?\d{4}[\s\-]?\d{4}/);
  return m ? m[0].replace(/[\s\-]/g, '') : null;
}

function pollClipboard() {
  window.api.invoke('read-clipboard').then(d => {
    if (d.text && d.text !== lastClipboard) {
      lastClipboard = d.text;
      const phone = extractPhone(d.text);
      if (phone) {
        const fbInput = document.getElementById('fbInput');
        const fbDialBtn = document.getElementById('fbDialBtn');
        fbInput.value = phone;
        fbDialBtn.disabled = !isConnected;
        showToast('检测到: ' + phone, 'success');
      }
    }
  }).catch(() => {}).finally(() => {
    clipboardTimer = setTimeout(pollClipboard, 500);
  });
}

pollClipboard();

// ==================== 清空按钮 ====================
function clearNumber() {
  const fbInput = document.getElementById('fbInput');
  const fbDialBtn = document.getElementById('fbDialBtn');
  fbInput.value = '';
  fbDialBtn.disabled = true;
  showToast('已清空', 'success');
}

function dialFromFloat() {
  const number = document.getElementById('fbInput').value.trim();
  if (!number) { showToast('请先复制号码', 'error'); return; }
  if (!isConnected) { showToast('手机未连接', 'error'); return; }
  window.api.send('dial', number);
}

function hangupFromFloat() {
  if (!isConnected) { showToast('手机未连接', 'error'); return; }
  window.api.send('hangup');
}

let toastTimer = null;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + (type || '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 2500);
}
</script>
</body>
</html>
