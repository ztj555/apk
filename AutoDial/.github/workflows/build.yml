name: Build AutoDial

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version from properties
        id: version
        run: |
          source .github/version.properties
          echo "versionName=$versionName" >> $GITHUB_OUTPUT
          echo "versionCode=$versionCode" >> $GITHUB_OUTPUT
          echo "Current version: $versionName (code: $versionCode)"

      - name: Update build.gradle with version
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ steps.version.outputs.versionCode }}/" android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"${{ steps.version.outputs.versionName }}\"/" android/app/build.gradle
          echo "Updated build.gradle:"
          grep -A2 "versionCode" android/app/build.gradle

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/autodial-release.p12
          echo "KEYSTORE_FILE=autodial-release.p12" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Create gradle wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.4

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AutoDial-APK-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: AutoDial-APK-Release
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Increment version for next build
        run: |
          source .github/version.properties
          # Increment versionName by 0.01
          versionMajor=$(echo $versionName | cut -d. -f1)
          versionMinor=$(echo $versionName | cut -d. -f2)
          versionMinor=$((10#$versionMinor + 1))
          if [ $versionMinor -ge 100 ]; then
            versionMajor=$((versionMajor + 1))
            versionMinor=0
          fi
          newVersionName="${versionMajor}.$(printf '%02d' $versionMinor)"
          newVersionCode=$((versionMajor * 100 + versionMinor))
          
          # Update version.properties
          cat > .github/version.properties << EOF
          # AutoDial Version Configuration
          # versionName format: X.YY (e.g., 3.21)
          # versionCode = versionName * 100 (e.g., 3.21 -> 321)
          versionName=${newVersionName}
          versionCode=${newVersionCode}
          EOF
          
          echo "Next version will be: $newVersionName (code: $newVersionCode)"
          
          # Commit and push the version increment
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .github/version.properties
          git commit -m "chore: bump version to ${newVersionName} [skip ci]" || echo "No changes to commit"
          git push || echo "No changes to push"
